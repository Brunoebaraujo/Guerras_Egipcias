name: Patch deck presets

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-deck-presets.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Include Enxame in default deck
        run: |
          node -e "const fs=require('fs'); const p='src/App.jsx'; let s=fs.readFileSync(p,'utf8'); const before=s; const deckOld='const DECK_LIST = [\n  \"montu\", \"carruagem\", \"guardareal\",\n  \"armadura\", \"escaravelho\", \"ammit\", \"sekhmet\",\n  \"mumia\", \"sobek\", \"hathor\", \"set\", \"selo\",\n];'; const deckNew='const DECK_LIST = [\n  \"montu\", \"carruagem\", \"guardareal\",\n  \"armadura\", \"escaravelho\", \"ammit\", \"enxame\",\n  \"mumia\", \"sobek\", \"hathor\", \"set\", \"selo\",\n];'; const presetOld='  \"Padrão\":     [\"montu\", \"carruagem\", \"guardareal\", \"armadura\", \"escaravelho\", \"ammit\", \"sekhmet\", \"mumia\", \"sobek\", \"hathor\", \"set\", \"selo\"],'; const presetNew='  \"Padrão\":     [\"montu\", \"carruagem\", \"guardareal\", \"armadura\", \"escaravelho\", \"ammit\", \"enxame\", \"mumia\", \"sobek\", \"hathor\", \"set\", \"selo\"],'; s=s.replace(deckOld,deckNew).replace(presetOld,presetNew); if(s===before){console.log('No preset patch needed.'); process.exit(0);} fs.writeFileSync(p,s);"

      - name: Commit patch
        run: |
          if git diff --quiet -- src/App.jsx; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx
          git commit -m "decks: inclui enxame no deck padrao"
          git push
